<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; padding: 10px; color: #333; margin: 0; }
    
    /* 入力エリア（サロン名・担当者） */
    .info-section {
      background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .info-input-group { display: flex; align-items: center; gap: 10px; }
    .info-input-group label { font-size: 0.85em; font-weight: bold; min-width: 100px; color: #555; }
    .info-input-group input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }

    /* 合計表示ヘッダー */
    .header {
      position: sticky; top: 0; background: #fff; padding: 15px;
      border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 15px; z-index: 100;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
    }
    .header-item { text-align: center; border-right: 1px solid #eee; }
    .header-item:last-child { border-right: none; }
    .header-item div { font-size: 0.7em; color: #666; margin-bottom: 4px; font-weight: bold; }
    .header-item span { font-size: 1.1em; font-weight: bold; color: #d32f2f; display: block; word-break: break-all; }

    /* テーブル */
    .table-wrapper { overflow-x: auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; min-width: 960px; table-layout: fixed; }
    th { background: #333; color: #fff; padding: 10px 5px; font-size: 0.75em; text-align: center; }
    td { padding: 10px 4px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.85em; }
    
    select, .custom-name { width: 95%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
    /* 数量入力欄：標準の矢印が表示されるようにスタイルを調整 */
    input[type="number"].p-qty { width: 90%; padding: 10px 5px 10px 10px; border-radius: 6px; border: 1px solid #ccc; text-align: center; font-size: 16px; box-sizing: border-box; }
    input[type="number"].p-list-price-input, input[type="number"].p-rate-input { width: 85%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; text-align: center; font-size: 16px; box-sizing: border-box; }
    
    .val-subtotal { font-weight: bold; color: #1a73e8; }
    .remove-btn { background: #ff5252; color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 0.8em; }
    .add-btn { background: #1a73e8; color: #fff; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-size: 1.1em; margin: 20px auto; display: block; width: 100%; font-weight: bold; box-shadow: 0 4px 6px rgba(26,115,232,0.3); }
    
    .hidden { display: none; }
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; color: #1a73e8; }

    @media (max-width: 600px) {
      .header-item span { font-size: 0.9em; }
    }
  </style>
</head>
<body>

  <div id="loading">データを読み込み中...</div>

  <div id="app-content" style="display:none;">
    <div class="info-section">
      <div class="info-input-group">
        <label>サロン名</label>
        <input type="text" placeholder="例：プロラボサロン" id="salon-name">
      </div>
      <div class="info-input-group">
        <label>PLH担当者名</label>
        <input type="text" placeholder="例：新屋" id="staff-name">
      </div>
    </div>

    <div class="header">
      <div class="header-item"><div>総数量</div><span id="total-qty">0</span></div>
      <div class="header-item"><div>計(税別)</div><span id="total-excl">0</span></div>
      <div class="header-item"><div>消費税</div><span id="total-tax">0</span></div>
      <div class="header-item"><div>計(税込)</div><span id="total-incl">0</span></div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <!-- 商品名の表示幅を 180px から 240px に広げました -->
            <th style="width: 240px;">商品名</th>
            <th style="width: 80px;">数量</th>
            <th style="width: 100px;">定価(税別)</th>
            <th style="width: 70px;">掛率</th>
            <th style="width: 100px;">税別単価</th>
            <th style="width: 100px;">税込単価</th>
            <th style="width: 110px;">税別小計</th>
            <th style="width: 110px;">税込小計</th>
            <th style="width: 60px;">操作</th>
          </tr>
        </thead>
        <tbody id="items-body"></tbody>
      </table>
    </div>

    <button id="add-btn" class="add-btn" onclick="addRow()" disabled>＋ 商品を追加する</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybauxe4di3hkE0mvEejYfzvz1LR_lGTTOOohQcH_pCvq1xvPUhBEtwtkdYL9SGrrm_/exec";
    let productData = [];

    window.onload = async function() {
      try {
        const response = await fetch(GAS_URL, { method: "POST" });
        productData = await response.json();
        initData();
      } catch (e) {
        document.getElementById('loading').innerText = "データの取得に失敗しました。";
        console.error(e);
      }
    };

    function initData() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app-content').style.display = 'block';
      document.getElementById('add-btn').disabled = false;
      addRow();
    }

    function addRow() {
      const tbody = document.getElementById('items-body');
      const row = document.createElement('tr');

      let options = '<option value="">商品を選択</option>';
      productData.forEach((p, index) => {
        options += `<option value="${index}">${p.name}</option>`;
      });
      options += `<option value="CUSTOM">対象外商品</option>`;

      row.innerHTML = `
        <td>
          <select class="p-select" onchange="handleProductChange(this)">${options}</select>
          <input type="text" class="custom-name hidden" placeholder="商品名を入力" oninput="calculate()">
        </td>
        <td><input type="number" class="p-qty" value="0" min="0" oninput="calculate()"></td>
        <td>
          <span class="p-list-price-text">¥0</span>
          <input type="number" class="p-list-price-input hidden" value="0" inputmode="numeric" oninput="calculate()">
        </td>
        <td>
          <span class="p-rate-text">-</span>
          <input type="number" class="p-rate-input hidden" value="100" inputmode="numeric" oninput="calculate()">
        </td>
        <td><span class="p-u-excl">¥0</span></td>
        <td><span class="p-u-incl">¥0</span></td>
        <td><span class="p-s-excl val-subtotal">¥0</span></td>
        <td><span class="p-s-incl val-subtotal">¥0</span></td>
        <td><button class="remove-btn" onclick="removeRow(this)">削除</button></td>
      `;
      tbody.appendChild(row);
      
      // 新しい行を追加した時にも重複チェックを走らせてセレクトボックスの状態を同期する
      updateSelectOptions();
    }

    function handleProductChange(select) {
      const row = select.parentElement.parentElement;
      const isCustom = select.value === "CUSTOM";
      
      row.querySelector('.custom-name').classList.toggle('hidden', !isCustom);
      row.querySelector('.custom-name').value = "";
      row.querySelector('.p-list-price-input').classList.toggle('hidden', !isCustom);
      row.querySelector('.p-list-price-input').value = 0;
      row.querySelector('.p-list-price-text').classList.toggle('hidden', isCustom);
      row.querySelector('.p-rate-input').classList.toggle('hidden', !isCustom);
      row.querySelector('.p-rate-input').value = 100;
      row.querySelector('.p-rate-text').classList.toggle('hidden', isCustom);
      
      // 商品が選択されたら、他行のセレクトボックスの選択肢を更新する
      updateSelectOptions();
      calculate();
    }

    function removeRow(btn) {
      btn.parentElement.parentElement.remove();
      // 行が削除されたら、他行のセレクトボックスの制限を解除するために更新する
      updateSelectOptions();
      calculate();
    }

    // 重複選択を防止するために、全行のセレクトボックスのoptionの有効/無効を切り替える関数
    function updateSelectOptions() {
      const rows = document.querySelectorAll('#items-body tr');
      
      // 現在選択されている商品のインデックス（CUSTOM以外）をリスト化
      const selectedValues = [];
      rows.forEach(row => {
        const val = row.querySelector('.p-select').value;
        if (val !== "" && val !== "CUSTOM") {
          selectedValues.push(val);
        }
      });

      // 各行のセレクトボックスを走査して、他行で選ばれている商品を disabled にする
      rows.forEach(row => {
        const select = row.querySelector('.p-select');
        const currentVal = select.value;
        const options = select.querySelectorAll('option');

        options.forEach(opt => {
          // 何も選択していない初期値、または「対象外商品(CUSTOM)」は常に選べるようにする
          if (opt.value === "" || opt.value === "CUSTOM") {
            opt.disabled = false;
            return;
          }
          
          // 自分が今選択している商品以外で、すでに他行で選ばれているものは非活性にする
          if (opt.value !== currentVal && selectedValues.includes(opt.value)) {
            opt.disabled = true;
          } else {
            opt.disabled = false;
          }
        });
      });
    }

    // 計算メイン処理
    function calculate() {
      const rows = document.querySelectorAll('#items-body tr');
      
      // 1. 先に「全体の総数量」を集計する
      let totalQty = 0;
      rows.forEach(row => {
        const select = row.querySelector('.p-select').value;
        const qty = parseInt(row.querySelector('.p-qty').value) || 0;
        if (select !== "" && qty > 0) {
          totalQty += qty;
        }
      });
      document.getElementById('total-qty').innerText = totalQty.toLocaleString();

      let grandTotalExcl = 0;
      let grandTotalIncl = 0;

      // 2. 確定した「totalQty」を使って各行の計算を行う
      rows.forEach(row => {
        const select = row.querySelector('.p-select');
        const qty = parseInt(row.querySelector('.p-qty').value) || 0;
        
        if (select.value === "" || qty <= 0) {
          resetRow(row);
          return;
        }

        let basePrice = 0;
        let rateVal = 1.0;
        let taxRate = 0.1;

        if (select.value === "CUSTOM") {
          basePrice = Number(row.querySelector('.p-list-price-input').value) || 0;
          rateVal = (Number(row.querySelector('.p-rate-input').value) || 100) / 100;
        } else {
          const product = productData[select.value];
          basePrice = Number(product.price);
          taxRate = Number(product.taxRate);
          
          for (let tier of product.tiers) {
            const min = tier.min === "" ? 0 : Number(tier.min);
            const max = tier.max === "" ? Infinity : Number(tier.max);
            if (totalQty >= min && totalQty <= max) {
              rateVal = Number(tier.rate) > 1 ? Number(tier.rate) / 100 : Number(tier.rate);
              break;
            }
          }
          row.querySelector('.p-list-price-text').innerText = '¥' + basePrice.toLocaleString();
          row.querySelector('.p-rate-text').innerText = Math.round(rateVal * 100) + '%';
        }

        const unitExcl = Math.floor(basePrice * rateVal);
        const unitIncl = Math.floor(unitExcl * (1 + taxRate));
        const subExcl = unitExcl * qty;
        const subIncl = unitIncl * qty;

        row.querySelector('.p-u-excl').innerText = '¥' + unitExcl.toLocaleString();
        row.querySelector('.p-u-incl').innerText = '¥' + unitIncl.toLocaleString();
        row.querySelector('.p-s-excl').innerText = '¥' + subExcl.toLocaleString();
        row.querySelector('.p-s-incl').innerText = '¥' + subIncl.toLocaleString();

        grandTotalExcl += subExcl;
        grandTotalIncl += subIncl;
      });

      document.getElementById('total-excl').innerText = grandTotalExcl.toLocaleString();
      document.getElementById('total-tax').innerText = (grandTotalIncl - grandTotalExcl).toLocaleString();
      document.getElementById('total-incl').innerText = grandTotalIncl.toLocaleString();
    }

    function resetRow(row) {
      const select = row.querySelector('.p-select').value;
      if (select !== "CUSTOM") {
        row.querySelector('.p-list-price-text').innerText = '¥0';
        row.querySelector('.p-rate-text').innerText = '-';
      }
      row.querySelector('.p-u-excl').innerText = '¥0';
      row.querySelector('.p-u-incl').innerText = '¥0';
      row.querySelector('.p-s-excl').innerText = '¥0';
      row.querySelector('.p-s-incl').innerText = '¥0';
    }
  </script>
</body>
</html>
